services:
  postgres:
    image: postgres:16-alpine
    container_name: elogia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: elogia_user
      POSTGRES_PASSWORD: elogia_password
      POSTGRES_DB: elogia_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elogia_user -d elogia_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - elogia-internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: elogia-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://elogia_user:elogia_password@postgres:5432/elogia_db
      ALEMBIC_DB_URL: postgresql+asyncpg://elogia_user:elogia_password@postgres:5432/elogia_db
      APP_ENV: production
      APP_DEBUG: "true"
      CORS_ORIGINS: '["http://localhost:4321","http://frontend:80","https://elogia.muradmadi.com","https://api.muradmadi.com"]'
      STORAGE_DIR: /app/storage/pdfs
      # Pass-through variables from Dokploy UI
      N8N_SHREDDER_WEBHOOK_URL: ${N8N_SHREDDER_WEBHOOK_URL}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      CLAY_WEBHOOK_URL: ${CLAY_WEBHOOK_URL}
      CLAY_WEBHOOK_AUTH_TOKEN: ${CLAY_WEBHOOK_AUTH_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - backend_storage:/app/storage/pdfs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/status"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.elogia-backend.rule=Host(`api.muradmadi.com`)"
      - "traefik.http.services.elogia-backend.loadbalancer.server.port=8000"
      - "traefik.docker.network=dokploy-network" # <-- The critical fix
    networks:
      - elogia-internal
      - dokploy-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        PUBLIC_API_URL: https://api.muradmadi.com
    container_name: elogia-frontend
    restart: unless-stopped
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.elogia-frontend.rule=Host(`elogia.muradmadi.com`)"
      - "traefik.http.services.elogia-frontend.loadbalancer.server.port=80"
      - "traefik.docker.network=dokploy-network" # <-- The critical fix
    networks:
      - elogia-internal
      - dokploy-network

volumes:
  postgres_data:
    driver: local
  backend_storage:
    driver: local

networks:
  elogia-internal:
    driver: bridge
  dokploy-network:
    external: true
    name: dokploy-network